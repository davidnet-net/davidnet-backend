services:
  davidnet-api:
    container_name: davidnet_backend
    build: .
    ports:
      - "3020:3020"
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - davidnet_internal

  postgres:
    container_name: davidnet_database
    image: postgres:18
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - ./volumes/pgdata:/var/lib/postgresql/data
    networks:
      - davidnet_internal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 2s
      timeout: 5s
      retries: 10

  pgweb:
    image: sosedoff/pgweb
    container_name: davidnet_pgweb
    ports:
      - "8081:8081"
    environment:
      - PGWEB_DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - davidnet_internal

volumes:
  pgdata:

networks:
  davidnet_internal:
    driver: bridge
